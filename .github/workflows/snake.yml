name: Generate contribution snake

"on":
  schedule:
    - cron: "27 */12 * * *"   # twice a day, offset from the hour
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Render snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=8b5cf6&color_dots=#161b22,#4c1d95,#6d28d9,#8b5cf6,#c4b5fd
            dist/github-snake.svg?palette=github-light&color_snake=7c3aed

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
